<!DOCTYPE html>
<html lang="en">

<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 3 CSS Lab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>My CSS Web Page</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>About Us</h2>
            <p>Welcome to our website! This section introduces our company and its values.</p>
        </section>

        <section id="services">
            <h2>Services</h2>
            <p>We offer a range of services designed to meet your needs.</p>
        </section>

        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send</button>
            </form>

        </section>

    </main>
    <footer>
        <p>&copy; 2026 John Christopher B. Ernas's Company</p>
    </footer>

</body>
</html>
